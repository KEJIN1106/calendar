<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>22/7 (ナナブンノニジュウニ) 活动日历</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nana: {
                            blue: "#1a3668",
                            light: "#e6f0fa",
                            accent: "#4a90e2"
                        }
                    }
                }
            }
        };
    </script>

    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f8fafc;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MOCK_EVENTS = [
            { id: 1, date: "2026-03-14", title: "22/7 音乐节目出演", category: "TV", time: "23:00", url: "https://nanabunnonijyuuni-mobile.com/" }
        ];

        const CATEGORY_COLORS = {
            TV: "bg-blue-100 text-blue-800 border-blue-200",
            Radio: "bg-orange-100 text-orange-800 border-orange-200",
            Web: "bg-purple-100 text-purple-800 border-purple-200",
            Event: "bg-pink-100 text-pink-800 border-pink-200",
            Live: "bg-red-100 text-red-800 border-red-200",
            Release: "bg-green-100 text-green-800 border-green-200",
            Other: "bg-gray-100 text-gray-800 border-gray-200"
        };

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1));
            const [events, setEvents] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [loadError, setLoadError] = useState("");
            const [dataSource, setDataSource] = useState("");

            useEffect(() => {
                const eventsUrl = new URL("./events.json", window.location.href).toString();
                console.log("正在加载 events.json:", eventsUrl);

                fetch(eventsUrl, { cache: "no-store" })
                    .then(async (res) => {
                        if (!res.ok) {
                            throw new Error(`HTTP ${res.status}`);
                        }

                        const text = await res.text();
                        console.log("events.json 原始内容前 300 字符:", text.slice(0, 300));

                        let data;
                        try {
                            data = JSON.parse(text);
                        } catch (e) {
                            throw new Error("JSON 解析失败: " + e.message);
                        }

                        if (!Array.isArray(data)) {
                            throw new Error("events.json 不是数组格式");
                        }

                        setEvents(data);
                        setDataSource(`已加载 events.json，共 ${data.length} 条活动`);
                        setLoadError("");
                        setIsLoading(false);

                        if (data.length > 0) {
                            const firstDate = data
                                .map(e => e.date)
                                .filter(Boolean)
                                .sort()[0];

                            if (firstDate && /^\d{4}-\d{2}-\d{2}$/.test(firstDate)) {
                                const [y, m] = firstDate.split("-");
                                console.log("最早活动月份:", y, m);
                            }
                        }
                    })
                    .catch((err) => {
                        console.error("加载 events.json 失败:", err);
                        setLoadError(String(err));
                        setEvents(MOCK_EVENTS);
                        setDataSource("加载失败，当前显示的是演示数据");
                        setIsLoading(false);
                    });
            }, []);

            useEffect(() => {
                lucide.createIcons();
            });

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const nextMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            };

            const prevMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            };

            const daysInMonth = getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth());
            const firstDay = getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth());

            const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
            const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

            const getEventsForDate = (dateString) => {
                return events.filter((e) => e.date === dateString);
            };

            const handleDayClick = (day) => {
                const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                setSelectedDate({ day, dateString, events: getEventsForDate(dateString) });
            };

            const currentMonthEventCount = useMemo(() => {
                const prefix = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}`;
                return events.filter(e => e.date && e.date.startsWith(prefix)).length;
            }, [events, currentDate]);

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-nana-blue text-white shadow-md py-4 px-6 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                                <i data-lucide="calendar-heart" className="w-6 h-6"></i>
                                22/7 (ナナブンノニジュウニ) 活动日历
                            </h1>
                            <a
                                href="https://nanabunnonijyuuni-mobile.com/"
                                target="_blank"
                                rel="noopener noreferrer"
                                className="text-sm text-nana-light hover:text-white transition hidden md:block"
                            >
                                访问官方移动端
                            </a>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-8 px-4">
                        <div className="mb-4 rounded-xl border bg-white p-3 text-sm text-gray-600 shadow-sm">
                            {isLoading ? "正在加载活动数据..." : dataSource}
                            {!isLoading && (
                                <div className="mt-1 text-gray-500">
                                    当前月份共有 {currentMonthEventCount} 条活动
                                </div>
                            )}
                            {loadError && (
                                <div className="mt-2 text-red-500 break-all">
                                    错误信息：{loadError}
                                </div>
                            )}
                        </div>

                        <div className="bg-white rounded-t-2xl shadow-sm border border-gray-100 p-4 md:p-6 flex justify-between items-center">
                            <button onClick={prevMonth} className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600">
                                <i data-lucide="chevron-left" className="w-6 h-6"></i>
                            </button>
                            <h2 className="text-2xl font-bold text-gray-800">
                                {currentDate.getFullYear()} 年 {monthNames[currentDate.getMonth()]}
                            </h2>
                            <button onClick={nextMonth} className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600">
                                <i data-lucide="chevron-right" className="w-6 h-6"></i>
                            </button>
                        </div>

                        <div className="bg-white border-x border-b border-gray-100 rounded-b-2xl shadow-sm overflow-hidden">
                            <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
                                {dayNames.map((day, i) => (
                                    <div
                                        key={day}
                                        className={`py-3 text-center text-sm font-medium ${i === 0 || i === 6 ? "text-nana-accent" : "text-gray-500"}`}
                                    >
                                        {day}
                                    </div>
                                ))}
                            </div>

                            <div className="grid grid-cols-7 auto-rows-fr">
                                {[...Array(firstDay)].map((_, i) => (
                                    <div key={`empty-${i}`} className="min-h-[100px] p-2 border-b border-r border-gray-50 bg-gray-50/50"></div>
                                ))}

                                {[...Array(daysInMonth)].map((_, i) => {
                                    const day = i + 1;
                                    const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                                    const dayEvents = getEventsForDate(dateString);
                                    const isToday =
                                        new Date().toDateString() ===
                                        new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toDateString();

                                    return (
                                        <div
                                            key={day}
                                            onClick={() => handleDayClick(day)}
                                            className="min-h-[100px] md:min-h-[120px] p-1 md:p-2 border-b border-r border-gray-100 hover:bg-nana-light/30 transition cursor-pointer relative group"
                                        >
                                            <div className="flex justify-between items-start mb-1">
                                                <span
                                                    className={`text-sm md:text-base w-7 h-7 flex items-center justify-center rounded-full ${
                                                        isToday
                                                            ? "bg-nana-accent text-white font-bold"
                                                            : "text-gray-700 font-medium group-hover:text-nana-blue"
                                                    }`}
                                                >
                                                    {day}
                                                </span>
                                                {dayEvents.length > 0 && (
                                                    <span className="text-xs bg-gray-100 text-gray-500 px-1.5 rounded-full hidden md:block">
                                                        {dayEvents.length}
                                                    </span>
                                                )}
                                            </div>

                                            <div className="space-y-1 mt-1">
                                                {dayEvents.slice(0, 3).map((e) => (
                                                    <div
                                                        key={e.id}
                                                        className={`text-xs px-1.5 py-1 rounded truncate border ${
                                                            CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other
                                                        }`}
                                                    >
                                                        {e.time && <span className="font-semibold mr-1">{e.time}</span>}
                                                        {e.title}
                                                    </div>
                                                ))}
                                                {dayEvents.length > 3 && (
                                                    <div className="text-xs text-center text-gray-400 font-medium">
                                                        + {dayEvents.length - 3} 个活动
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                    {selectedDate && (
                        <div
                            className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
                            onClick={() => setSelectedDate(null)}
                        >
                            <div
                                className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="bg-nana-blue p-4 flex justify-between items-center text-white">
                                    <h3 className="text-lg font-bold flex items-center gap-2">
                                        <i data-lucide="calendar" className="w-5 h-5"></i>
                                        {selectedDate.dateString} 活动日程
                                    </h3>
                                    <button onClick={() => setSelectedDate(null)} className="hover:bg-white/20 p-1 rounded transition">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="p-4 max-h-[60vh] overflow-y-auto">
                                    {selectedDate.events.length === 0 ? (
                                        <div className="text-center py-8 text-gray-400">
                                            <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                                            <p>这一天暂时没有记录活动哦</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {selectedDate.events.map((e) => (
                                                <div
                                                    key={e.id}
                                                    className={`p-3 rounded-xl border flex gap-3 ${
                                                        CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other
                                                    }`}
                                                >
                                                    <div className="mt-0.5">
                                                        {e.category === "TV" ? (
                                                            <i data-lucide="tv" className="w-5 h-5"></i>
                                                        ) : e.category === "Radio" ? (
                                                            <i data-lucide="radio" className="w-5 h-5"></i>
                                                        ) : (
                                                            <i data-lucide="star" className="w-5 h-5"></i>
                                                        )}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="font-bold text-sm mb-0.5">{e.title}</div>
                                                        <div className="text-xs opacity-80 flex items-center gap-3 mb-1">
                                                            {e.time && (
                                                                <span>
                                                                    <i data-lucide="clock" className="w-3 h-3 inline mr-1"></i>
                                                                    {e.time}
                                                                </span>
                                                            )}
                                                            <span className="uppercase font-semibold tracking-wider">{e.category}</span>
                                                        </div>
                                                        {e.url && (
                                                            <a
                                                                href={e.url}
                                                                target="_blank"
                                                                rel="noopener noreferrer"
                                                                className="inline-flex items-center text-xs text-nana-accent hover:text-blue-800 transition mt-1"
                                                            >
                                                                查看详情
                                                                <i data-lucide="external-link" className="w-3 h-3 ml-1"></i>
                                                            </a>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                                    <button
                                        onClick={() => setSelectedDate(null)}
                                        className="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-sm font-medium transition"
                                    >
                                        关闭
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
