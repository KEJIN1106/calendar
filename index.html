<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多企划活动日历</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nana: {
                            blue: "#1a3668",
                            light: "#e6f0fa",
                            accent: "#4a90e2",
                            pink: "#df7083"
                        }
                    },
                    boxShadow: {
                        soft: "0 10px 30px rgba(26,54,104,0.08)"
                    }
                }
            }
        };
    </script>

    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #edf4fb 100%);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MOCK_EVENTS = [
            {
                id: "1",
                date: "2026-03-07",
                title: "TOKYO MX・BS11『22/7 計算外』",
                category: "TV",
                time: "",
                url: "https://nanabunnonijyuuni-mobile.com/",
                project: "22/7",
                source: "nanabunnonijyuuni-mobile.com"
            },
            {
                id: "2",
                date: "2026-04-11",
                title: "BanG Dream! Special LIVE in TAIPEI",
                category: "Live",
                time: "",
                url: "https://bang-dream.com/events/",
                project: "BanG Dream!",
                source: "bang-dream.com"
            }
        ];

        const CATEGORY_COLORS = {
            TV: "bg-blue-100 text-blue-800 border-blue-200",
            Radio: "bg-orange-100 text-orange-800 border-orange-200",
            Web: "bg-purple-100 text-purple-800 border-purple-200",
            Event: "bg-pink-100 text-pink-800 border-pink-200",
            Live: "bg-red-100 text-red-800 border-red-200",
            Release: "bg-green-100 text-green-800 border-green-200",
            Other: "bg-gray-100 text-gray-800 border-gray-200"
        };

        const CATEGORY_LABELS = {
            All: "全部分类",
            Event: "Event",
            TV: "TV",
            Radio: "Radio",
            Web: "Web",
            Live: "Live",
            Release: "Release",
            Other: "Other"
        };

        const VIEW_LABELS = {
            month: "月历",
            week: "周视图",
            list: "列表",
            category: "分类"
        };

        const PROJECT_COLORS = {
            "22/7": "bg-sky-100 text-sky-800 border-sky-200",
            "BanG Dream!": "bg-violet-100 text-violet-800 border-violet-200",
            "All": "bg-gray-100 text-gray-800 border-gray-200"
        };

        function formatDateCN(dateStr) {
            if (!dateStr) return "";
            const [y, m, d] = dateStr.split("-");
            return `${y}年${Number(m)}月${Number(d)}日`;
        }

        function formatShortDate(dateStr) {
            if (!dateStr) return "";
            const [_, m, d] = dateStr.split("-");
            return `${Number(m)}/${Number(d)}`;
        }

        function getWeekDates(baseDate) {
            const d = new Date(baseDate);
            const day = d.getDay();
            const start = new Date(d);
            start.setDate(d.getDate() - day);

            return Array.from({ length: 7 }, (_, i) => {
                const current = new Date(start);
                current.setDate(start.getDate() + i);
                return current;
            });
        }

        function groupByDate(items) {
            const map = {};
            items.forEach(item => {
                if (!map[item.date]) map[item.date] = [];
                map[item.date].push(item);
            });
            return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
        }

        function groupByCategory(items) {
            const map = {};
            items.forEach(item => {
                if (!map[item.category]) map[item.category] = [];
                map[item.category].push(item);
            });
            return map;
        }

        function uniqueProjects(events) {
            return [...new Set(events.map(e => e.project).filter(Boolean))].sort();
        }

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [events, setEvents] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [loadError, setLoadError] = useState("");
            const [dataSource, setDataSource] = useState("");
            const [viewMode, setViewMode] = useState("month");
            const [activeCategory, setActiveCategory] = useState("All");
            const [activeProject, setActiveProject] = useState("All");
            const [searchText, setSearchText] = useState("");

            useEffect(() => {
                const eventsUrl = new URL("./events.json", window.location.href).toString();

                fetch(eventsUrl, { cache: "no-store" })
                    .then(async (res) => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const text = await res.text();

                        let data;
                        try {
                            data = JSON.parse(text);
                        } catch (e) {
                            throw new Error("JSON 解析失败: " + e.message);
                        }

                        if (!Array.isArray(data)) {
                            throw new Error("events.json 不是数组格式");
                        }

                        setEvents(data);
                        setDataSource(`已加载 events.json，共 ${data.length} 条活动`);
                        setLoadError("");
                        setIsLoading(false);
                    })
                    .catch((err) => {
                        console.error("加载 events.json 失败:", err);
                        setLoadError(String(err));
                        setEvents(MOCK_EVENTS);
                        setDataSource("加载失败，当前显示的是演示数据");
                        setIsLoading(false);
                    });
            }, []);

            useEffect(() => {
                lucide.createIcons();
            });

            const projectOptions = useMemo(() => ["All", ...uniqueProjects(events)], [events]);

            const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
            const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

            const currentMonthPrefix = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}`;

            const projectFilteredEvents = useMemo(() => {
                return events.filter(e => activeProject === "All" ? true : e.project === activeProject);
            }, [events, activeProject]);

            const allMonthEvents = useMemo(() => {
                return projectFilteredEvents.filter(e => e.date?.startsWith(currentMonthPrefix));
            }, [projectFilteredEvents, currentMonthPrefix]);

            const filteredEvents = useMemo(() => {
                return projectFilteredEvents.filter((e) => {
                    const inCategory = activeCategory === "All" ? true : e.category === activeCategory;
                    const inSearch = searchText.trim()
                        ? (e.title || "").toLowerCase().includes(searchText.trim().toLowerCase())
                        : true;

                    if (viewMode === "week") {
                        return inCategory && inSearch;
                    }

                    return e.date?.startsWith(currentMonthPrefix) && inCategory && inSearch;
                });
            }, [projectFilteredEvents, currentMonthPrefix, activeCategory, searchText, viewMode]);

            const monthCategoryStats = useMemo(() => {
                const stats = {
                    All: allMonthEvents.length,
                    Event: 0,
                    TV: 0,
                    Radio: 0,
                    Web: 0,
                    Live: 0,
                    Release: 0,
                    Other: 0
                };
                allMonthEvents.forEach(e => {
                    if (stats[e.category] !== undefined) stats[e.category] += 1;
                    else stats.Other += 1;
                });
                return stats;
            }, [allMonthEvents]);

            const monthProjectStats = useMemo(() => {
                const stats = {};
                allMonthEvents.forEach(e => {
                    const p = e.project || "Unknown";
                    stats[p] = (stats[p] || 0) + 1;
                });
                return stats;
            }, [allMonthEvents]);

            const sortedFilteredEvents = useMemo(() => {
                return [...filteredEvents].sort((a, b) => {
                    return a.date.localeCompare(b.date) ||
                           (a.project || "").localeCompare(b.project || "") ||
                           (a.title || "").localeCompare(b.title || "");
                });
            }, [filteredEvents]);

            const latestEvents = useMemo(() => {
                return [...sortedFilteredEvents].slice(0, 8);
            }, [sortedFilteredEvents]);

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const daysInMonth = getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth());
            const firstDay = getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth());

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const nextWeek = () => {
                const d = new Date(currentDate);
                d.setDate(d.getDate() + 7);
                setCurrentDate(d);
            };

            const prevWeek = () => {
                const d = new Date(currentDate);
                d.setDate(d.getDate() - 7);
                setCurrentDate(d);
            };

            const jumpToToday = () => setCurrentDate(new Date());

            const getEventsForDate = (dateString) => filteredEvents.filter(e => e.date === dateString);

            const handleDayClick = (day) => {
                const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                setSelectedDate({
                    day,
                    dateString,
                    events: getEventsForDate(dateString)
                });
            };

            const groupedListEvents = useMemo(() => groupByDate(sortedFilteredEvents), [sortedFilteredEvents]);
            const groupedCategoryEvents = useMemo(() => groupByCategory(sortedFilteredEvents), [sortedFilteredEvents]);
            const weekDates = useMemo(() => getWeekDates(currentDate), [currentDate]);

            const totalCategoriesWithEvents = useMemo(() => {
                return ["Event", "TV", "Radio", "Web", "Live", "Release", "Other"]
                    .filter(cat => monthCategoryStats[cat] > 0).length;
            }, [monthCategoryStats]);

            const renderHero = () => (
                <div className="relative overflow-hidden rounded-3xl bg-gradient-to-r from-nana-blue via-[#244b8d] to-nana-pink text-white shadow-soft">
                    <div className="absolute inset-0 opacity-10">
                        <div className="absolute -top-10 -right-10 w-56 h-56 rounded-full bg-white"></div>
                        <div className="absolute bottom-0 left-10 w-36 h-36 rounded-full bg-white"></div>
                    </div>
                    <div className="relative p-6 md:p-8">
                        <div className="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                            <div>
                                <div className="inline-flex items-center gap-2 text-xs md:text-sm bg-white/15 px-3 py-1 rounded-full mb-3">
                                    <i data-lucide="sparkles" className="w-4 h-4"></i>
                                    多企划活动聚合日历
                                </div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 min-w-full md:min-w-[440px]">
                                <div className="rounded-2xl bg-white/12 backdrop-blur p-4">
                                    <div className="text-xs text-white/70">本月活动</div>
                                    <div className="text-2xl font-bold mt-1">{allMonthEvents.length}</div>
                                </div>
                                <div className="rounded-2xl bg-white/12 backdrop-blur p-4">
                                    <div className="text-xs text-white/70">筛选后</div>
                                    <div className="text-2xl font-bold mt-1">{filteredEvents.length}</div>
                                </div>
                                <div className="rounded-2xl bg-white/12 backdrop-blur p-4">
                                    <div className="text-xs text-white/70">有活动分类</div>
                                    <div className="text-2xl font-bold mt-1">{totalCategoriesWithEvents}</div>
                                </div>
                                <div className="rounded-2xl bg-white/12 backdrop-blur p-4">
                                    <div className="text-xs text-white/70">当前企划</div>
                                    <div className="text-lg font-bold mt-2">{activeProject}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderToolbar = () => (
                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4 md:p-5">
                    <div className="flex flex-col gap-4">
                        <div className="flex flex-col xl:flex-row gap-3 xl:items-center xl:justify-between">
                            <div className="flex flex-wrap gap-2">
                                {["month", "week", "list", "category"].map((mode) => (
                                    <button
                                        key={mode}
                                        onClick={() => setViewMode(mode)}
                                        className={`px-3 py-2 rounded-xl text-sm font-medium border transition ${
                                            viewMode === mode
                                                ? "bg-nana-blue text-white border-nana-blue shadow"
                                                : "bg-white text-gray-600 border-gray-200 hover:bg-gray-50"
                                        }`}
                                    >
                                        {VIEW_LABELS[mode]}
                                    </button>
                                ))}
                            </div>

                            <div className="flex flex-col md:flex-row gap-3">
                                <div className="relative">
                                    <i data-lucide="search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                    <input
                                        type="text"
                                        value={searchText}
                                        onChange={(e) => setSearchText(e.target.value)}
                                        placeholder="搜索活动标题"
                                        className="w-full md:w-72 rounded-xl border border-gray-200 pl-9 pr-3 py-2.5 text-sm outline-none focus:border-nana-accent"
                                    />
                                </div>

                                <div className="flex gap-2">
                                    <button
                                        onClick={jumpToToday}
                                        className="px-3 py-2 rounded-xl text-sm font-medium border border-gray-200 bg-white hover:bg-gray-50"
                                    >
                                        今天
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-2">
                            {projectOptions.map((project) => (
                                <button
                                    key={project}
                                    onClick={() => setActiveProject(project)}
                                    className={`px-3 py-1.5 rounded-full text-xs font-medium border transition ${
                                        activeProject === project
                                            ? "bg-nana-blue text-white border-nana-blue"
                                            : `${PROJECT_COLORS[project] || PROJECT_COLORS.All} hover:opacity-90`
                                    }`}
                                >
                                    {project}
                                </button>
                            ))}
                        </div>

                        <div className="flex flex-wrap gap-2">
                            {Object.keys(CATEGORY_LABELS).map((cat) => (
                                <button
                                    key={cat}
                                    onClick={() => setActiveCategory(cat)}
                                    className={`px-3 py-1.5 rounded-full text-xs font-medium border transition ${
                                        activeCategory === cat
                                            ? "bg-nana-pink text-white border-nana-pink"
                                            : "bg-white text-gray-600 border-gray-200 hover:bg-gray-50"
                                    }`}
                                >
                                    {CATEGORY_LABELS[cat]} ({monthCategoryStats[cat] ?? 0})
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center justify-between bg-gray-50 rounded-xl px-4 py-3 text-sm text-gray-600">
                            <div>
                                {isLoading ? "正在加载活动数据..." : dataSource}
                            </div>
                            <div className="hidden md:block">
                                当前月份共有 {allMonthEvents.length} 条，当前筛选显示 {filteredEvents.length} 条
                            </div>
                        </div>

                        {loadError && (
                            <div className="rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-600 break-all">
                                错误信息：{loadError}
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderCalendarNav = () => {
                const weekStart = getWeekDates(currentDate)[0];
                const weekEnd = getWeekDates(currentDate)[6];
                const isWeekMode = viewMode === "week";

                const weekTitle = `${weekStart.getFullYear()}年${weekStart.getMonth() + 1}月${weekStart.getDate()}日 - ${weekEnd.getMonth() + 1}月${weekEnd.getDate()}日`;

                return (
                    <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4 md:p-6 flex justify-between items-center">
                        <button
                            onClick={isWeekMode ? prevWeek : prevMonth}
                            className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600"
                            title={isWeekMode ? "上一周" : "上一月"}
                        >
                            <i data-lucide="chevron-left" className="w-6 h-6"></i>
                        </button>

                        <h2 className="text-lg md:text-2xl font-bold text-gray-800 text-center px-4">
                            {isWeekMode
                                ? weekTitle
                                : `${currentDate.getFullYear()} 年 ${monthNames[currentDate.getMonth()]}`}
                        </h2>

                        <button
                            onClick={isWeekMode ? nextWeek : nextMonth}
                            className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600"
                            title={isWeekMode ? "下一周" : "下一月"}
                        >
                            <i data-lucide="chevron-right" className="w-6 h-6"></i>
                        </button>
                    </div>
                );
            };

            const renderProjectBadge = (project) => (
                <span className={`text-[10px] px-2 py-0.5 rounded-full border ${PROJECT_COLORS[project] || PROJECT_COLORS.All}`}>
                    {project}
                </span>
            );

            const renderMonthView = () => (
                <div className="bg-white rounded-2xl shadow-soft border border-white/60 overflow-hidden">
                    <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
                        {dayNames.map((day, i) => (
                            <div
                                key={day}
                                className={`py-3 text-center text-sm font-medium ${i === 0 || i === 6 ? "text-nana-accent" : "text-gray-500"}`}
                            >
                                {day}
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-7 auto-rows-fr">
                        {[...Array(firstDay)].map((_, i) => (
                            <div key={`empty-${i}`} className="min-h-[105px] p-2 border-b border-r border-gray-50 bg-gray-50/50"></div>
                        ))}

                        {[...Array(daysInMonth)].map((_, i) => {
                            const day = i + 1;
                            const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                            const dayEvents = getEventsForDate(dateString);
                            const isToday =
                                new Date().toDateString() ===
                                new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toDateString();

                            return (
                                <div
                                    key={day}
                                    onClick={() => handleDayClick(day)}
                                    className="min-h-[105px] md:min-h-[128px] p-1.5 md:p-2 border-b border-r border-gray-100 hover:bg-nana-light/30 transition cursor-pointer relative group"
                                >
                                    <div className="flex justify-between items-start mb-1">
                                        <span
                                            className={`text-sm md:text-base w-7 h-7 flex items-center justify-center rounded-full ${
                                                isToday
                                                    ? "bg-nana-accent text-white font-bold"
                                                    : "text-gray-700 font-medium group-hover:text-nana-blue"
                                            }`}
                                        >
                                            {day}
                                        </span>
                                        {dayEvents.length > 0 && (
                                            <span className="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full hidden md:block">
                                                {dayEvents.length}
                                            </span>
                                        )}
                                    </div>

                                    <div className="space-y-1 mt-1">
                                        {dayEvents.slice(0, 3).map((e) => (
                                            <div
                                                key={e.id}
                                                className={`text-[11px] px-1.5 py-1 rounded-lg truncate border ${
                                                    CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other
                                                }`}
                                            >
                                                {activeProject === "All" && e.project && (
                                                    <span className="mr-1 font-semibold">[{e.project}]</span>
                                                )}
                                                {e.title}
                                            </div>
                                        ))}
                                        {dayEvents.length > 3 && (
                                            <div className="text-[11px] text-center text-gray-400 font-medium">
                                                + {dayEvents.length - 3} 个活动
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderWeekView = () => (
                <div className="bg-white rounded-2xl shadow-soft border border-white/60 overflow-hidden">
                    <div className="grid grid-cols-1 md:grid-cols-7 border-b border-gray-100 bg-gray-50">
                        {weekDates.map((date, idx) => {
                            const dateString = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
                            const items = getEventsForDate(dateString);
                            const today = new Date().toDateString() === date.toDateString();
                            return (
                                <div key={dateString} className="p-4 border-r last:border-r-0">
                                    <div className={`text-xs ${idx === 0 || idx === 6 ? "text-nana-accent" : "text-gray-500"}`}>
                                        {dayNames[idx]}
                                    </div>
                                    <div className={`mt-1 text-lg font-bold ${today ? "text-nana-blue" : "text-gray-800"}`}>
                                        {date.getMonth() + 1}/{date.getDate()}
                                    </div>
                                    <div className="text-xs text-gray-400 mt-1">{items.length} 条活动</div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-7">
                        {weekDates.map((date) => {
                            const dateString = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
                            const items = getEventsForDate(dateString);
                            return (
                                <div key={dateString} className="min-h-[260px] p-3 border-r last:border-r-0 border-b md:border-b-0">
                                    <div className="space-y-2">
                                        {items.length === 0 ? (
                                            <div className="text-xs text-gray-300 pt-2">暂无活动</div>
                                        ) : (
                                            items.map((e) => (
                                                <a
                                                    key={e.id}
                                                    href={e.url || "#"}
                                                    target={e.url ? "_blank" : "_self"}
                                                    rel="noopener noreferrer"
                                                    className={`block text-xs px-2 py-2 rounded-xl border hover:opacity-90 ${
                                                        CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other
                                                    }`}
                                                >
                                                    <div className="flex items-center gap-1 mb-1">
                                                        {activeProject === "All" && e.project && renderProjectBadge(e.project)}
                                                    </div>
                                                    <div className="font-semibold line-clamp-2">{e.title}</div>
                                                    <div className="mt-1 opacity-70 uppercase">{e.category}</div>
                                                </a>
                                            ))
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderListView = () => (
                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-5 md:p-6">
                    {groupedListEvents.length === 0 ? (
                        <div className="text-center py-12 text-gray-400">当前条件下没有活动</div>
                    ) : (
                        <div className="space-y-8">
                            {groupedListEvents.map(([date, items]) => (
                                <div key={date}>
                                    <h3 className="text-lg font-bold text-gray-800 border-l-4 border-nana-accent pl-3">
                                        {formatDateCN(date)}
                                    </h3>
                                    <div className="space-y-3 mt-4">
                                        {items.map((e) => (
                                            <div
                                                key={e.id}
                                                className={`p-4 rounded-2xl border ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other}`}
                                            >
                                                <div className="flex items-start justify-between gap-3">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-2 flex-wrap">
                                                            {e.project && renderProjectBadge(e.project)}
                                                            {e.source && (
                                                                <span className="text-[10px] text-gray-500 bg-white/70 px-2 py-0.5 rounded-full border border-gray-200">
                                                                    {e.source}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <div className="font-bold text-sm md:text-base">{e.title}</div>
                                                        <div className="mt-2 text-xs opacity-80 flex items-center gap-3 flex-wrap">
                                                            <span className="uppercase font-semibold tracking-wider">{e.category}</span>
                                                            {e.time && <span>{e.time}</span>}
                                                        </div>
                                                    </div>
                                                    {e.url && (
                                                        <a
                                                            href={e.url}
                                                            target="_blank"
                                                            rel="noopener noreferrer"
                                                            className="text-xs text-nana-accent hover:text-blue-800 whitespace-nowrap"
                                                        >
                                                            查看详情
                                                        </a>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderCategoryView = () => {
                const order = ["Event", "TV", "Radio", "Web", "Live", "Release", "Other"];
                const categoriesToShow = activeCategory === "All" ? order : [activeCategory];

                return (
                    <div className="space-y-4">
                        {categoriesToShow.map((cat) => {
                            const items = groupedCategoryEvents[cat] || [];
                            return (
                                <div key={cat} className="bg-white rounded-2xl shadow-soft border border-white/60 p-5 md:p-6">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-lg font-bold text-gray-800">{CATEGORY_LABELS[cat]}</h3>
                                        <span className={`text-xs px-2 py-1 rounded-full border ${CATEGORY_COLORS[cat] || CATEGORY_COLORS.Other}`}>
                                            {items.length} 条
                                        </span>
                                    </div>

                                    {items.length === 0 ? (
                                        <div className="text-sm text-gray-400">这一类当前月份没有活动</div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {items.map((e) => (
                                                <div
                                                    key={e.id}
                                                    className={`p-4 rounded-2xl border ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other}`}
                                                >
                                                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                                                        {e.project && renderProjectBadge(e.project)}
                                                    </div>
                                                    <div className="text-xs opacity-70 mb-2">{formatDateCN(e.date)}</div>
                                                    <div className="font-bold text-sm md:text-base">{e.title}</div>
                                                    {e.url && (
                                                        <a
                                                            href={e.url}
                                                            target="_blank"
                                                            rel="noopener noreferrer"
                                                            className="inline-block mt-3 text-xs text-nana-accent hover:text-blue-800"
                                                        >
                                                            查看详情
                                                        </a>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const renderMainView = () => {
                if (viewMode === "month") return renderMonthView();
                if (viewMode === "week") return renderWeekView();
                if (viewMode === "list") return renderListView();
                return renderCategoryView();
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-nana-blue text-white shadow-md py-4 px-6 sticky top-0 z-30 backdrop-blur">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                                <i data-lucide="calendar-heart" className="w-6 h-6"></i>
                                多企划活动日历
                            </h1>
                            <div className="hidden md:flex items-center gap-2 text-sm text-nana-light">
                                <span>当前企划：</span>
                                <span className="text-white font-semibold">{activeProject}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto mt-8 px-4 space-y-6">
                        {renderHero()}
                        {renderToolbar()}

                        <div className="grid grid-cols-1 xl:grid-cols-[260px_minmax(0,1fr)_300px] gap-6">
                            <aside className="space-y-4">
                                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">企划页签</h3>
                                    <div className="space-y-2">
                                        {projectOptions.map((project) => (
                                            <button
                                                key={project}
                                                onClick={() => setActiveProject(project)}
                                                className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm border transition ${
                                                    activeProject === project
                                                        ? "bg-nana-blue text-white border-nana-blue"
                                                        : "bg-white text-gray-700 border-gray-200 hover:bg-gray-50"
                                                }`}
                                            >
                                                <span>{project}</span>
                                                <span className="text-xs opacity-80">
                                                    {project === "All"
                                                        ? allMonthEvents.length
                                                        : (monthProjectStats[project] || 0)}
                                                </span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">分类页签</h3>
                                    <div className="space-y-2">
                                        {Object.keys(CATEGORY_LABELS).map((cat) => (
                                            <button
                                                key={cat}
                                                onClick={() => {
                                                    setActiveCategory(cat);
                                                    if (cat !== "All") setViewMode("category");
                                                }}
                                                className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm border transition ${
                                                    activeCategory === cat
                                                        ? "bg-nana-pink text-white border-nana-pink"
                                                        : "bg-white text-gray-700 border-gray-200 hover:bg-gray-50"
                                                }`}
                                            >
                                                <span>{CATEGORY_LABELS[cat]}</span>
                                                <span className="text-xs opacity-80">{monthCategoryStats[cat] ?? 0}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">快速模式</h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        {["month", "week", "list", "category"].map((mode) => (
                                            <button
                                                key={mode}
                                                onClick={() => setViewMode(mode)}
                                                className={`px-3 py-2 rounded-xl text-sm border ${
                                                    viewMode === mode
                                                        ? "bg-nana-blue text-white border-nana-blue"
                                                        : "bg-white text-gray-700 border-gray-200 hover:bg-gray-50"
                                                }`}
                                            >
                                                {VIEW_LABELS[mode]}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </aside>

                            <section className="space-y-4">
                                {renderCalendarNav()}
                                {renderMainView()}
                            </section>

                            <aside className="space-y-4">
                                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">本月分类统计</h3>
                                    <div className="space-y-2">
                                        {Object.entries(monthCategoryStats).map(([cat, count]) => (
                                            <div key={cat} className="flex items-center justify-between text-sm">
                                                <span className={cat === "All" ? "text-gray-800 font-semibold" : "text-gray-600"}>
                                                    {CATEGORY_LABELS[cat]}
                                                </span>
                                                <span className="font-bold text-gray-800">{count}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">本月企划统计</h3>
                                    <div className="space-y-2">
                                        {Object.keys(monthProjectStats).length === 0 ? (
                                            <div className="text-sm text-gray-400">暂无数据</div>
                                        ) : (
                                            Object.entries(monthProjectStats).map(([project, count]) => (
                                                <div key={project} className="flex items-center justify-between text-sm">
                                                    <span className="text-gray-600">{project}</span>
                                                    <span className="font-bold text-gray-800">{count}</span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">最近活动</h3>
                                    <div className="space-y-3">
                                        {latestEvents.length === 0 ? (
                                            <div className="text-sm text-gray-400">暂无活动</div>
                                        ) : (
                                            latestEvents.map((e) => (
                                                <div key={e.id} className="border border-gray-100 rounded-xl p-3 hover:bg-gray-50 transition">
                                                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                        <div className="text-xs text-gray-400">{formatShortDate(e.date)}</div>
                                                        {e.project && renderProjectBadge(e.project)}
                                                    </div>
                                                    <div className="text-sm font-semibold text-gray-800 mt-1 line-clamp-2">{e.title}</div>
                                                    <div className="mt-2">
                                                        <span className={`text-[11px] px-2 py-1 rounded-full border ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other}`}>
                                                            {e.category}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-soft border border-white/60 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">说明</h3>
                                    <div className="text-sm text-gray-600 space-y-2">
                                        <p>支持 22/7 与 BanG Dream! 多企划切换。</p>
                                        <p>月历：适合按日期总览。</p>
                                        <p>周视图：适合看一周内密集安排。</p>
                                        <p>列表：适合连续浏览当前月份活动。</p>
                                        <p>分类：适合单独查看 Event / TV / Radio / Live。</p>
                                    </div>
                                </div>
                            </aside>
                        </div>
                    </main>

                    {selectedDate && (
                        <div
                            className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
                            onClick={() => setSelectedDate(null)}
                        >
                            <div
                                className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="bg-nana-blue p-4 flex justify-between items-center text-white">
                                    <h3 className="text-lg font-bold flex items-center gap-2">
                                        <i data-lucide="calendar" className="w-5 h-5"></i>
                                        {selectedDate.dateString} 活动日程
                                    </h3>
                                    <button onClick={() => setSelectedDate(null)} className="hover:bg-white/20 p-1 rounded transition">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="p-4 max-h-[60vh] overflow-y-auto">
                                    {selectedDate.events.length === 0 ? (
                                        <div className="text-center py-8 text-gray-400">
                                            <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                                            <p>这一天暂时没有记录活动哦</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {selectedDate.events.map((e) => (
                                                <div
                                                    key={e.id}
                                                    className={`p-3 rounded-xl border flex gap-3 ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other}`}
                                                >
                                                    <div className="mt-0.5">
                                                        {e.category === "TV" ? (
                                                            <i data-lucide="tv" className="w-5 h-5"></i>
                                                        ) : e.category === "Radio" ? (
                                                            <i data-lucide="radio" className="w-5 h-5"></i>
                                                        ) : e.category === "Live" ? (
                                                            <i data-lucide="mic-2" className="w-5 h-5"></i>
                                                        ) : (
                                                            <i data-lucide="star" className="w-5 h-5"></i>
                                                        )}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-2 flex-wrap">
                                                            {e.project && renderProjectBadge(e.project)}
                                                            {e.source && (
                                                                <span className="text-[10px] text-gray-500 bg-white/70 px-2 py-0.5 rounded-full border border-gray-200">
                                                                    {e.source}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <div className="font-bold text-sm mb-0.5">{e.title}</div>
                                                        <div className="text-xs opacity-80 flex items-center gap-3 mb-1 flex-wrap">
                                                            {e.time && <span>{e.time}</span>}
                                                            <span className="uppercase font-semibold tracking-wider">{e.category}</span>
                                                        </div>
                                                        {e.url && (
                                                            <a
                                                                href={e.url}
                                                                target="_blank"
                                                                rel="noopener noreferrer"
                                                                className="inline-flex items-center text-xs text-nana-accent hover:text-blue-800 transition mt-1"
                                                            >
                                                                查看详情 <i data-lucide="external-link" className="w-3 h-3 ml-1"></i>
                                                            </a>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                                    <button
                                        onClick={() => setSelectedDate(null)}
                                        className="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-sm font-medium transition"
                                    >
                                        关闭
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
