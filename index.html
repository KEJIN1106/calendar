<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>22/7 (ナナブンノニジュウニ) 活动日历</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nana: {
                            blue: "#1a3668",
                            light: "#e6f0fa",
                            accent: "#4a90e2"
                        }
                    }
                }
            }
        };
    </script>

    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f8fafc;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MOCK_EVENTS = [
            { id: 1, date: "2026-03-14", title: "22/7 音乐节目出演", category: "TV", time: "", url: "https://nanabunnonijyuuni-mobile.com/" }
        ];

        const CATEGORY_COLORS = {
            TV: "bg-blue-100 text-blue-800 border-blue-200",
            Radio: "bg-orange-100 text-orange-800 border-orange-200",
            Web: "bg-purple-100 text-purple-800 border-purple-200",
            Event: "bg-pink-100 text-pink-800 border-pink-200",
            Live: "bg-red-100 text-red-800 border-red-200",
            Release: "bg-green-100 text-green-800 border-green-200",
            Other: "bg-gray-100 text-gray-800 border-gray-200"
        };

        const CATEGORY_LABELS = {
            All: "全部",
            TV: "TV",
            Radio: "Radio",
            Web: "Web",
            Event: "Event",
            Live: "Live",
            Release: "Release",
            Other: "Other"
        };

        const VIEW_LABELS = {
            month: "月历",
            list: "列表",
            category: "分类"
        };

        function formatDateCN(dateStr) {
            if (!dateStr) return "";
            const [y, m, d] = dateStr.split("-");
            return `${y}年${Number(m)}月${Number(d)}日`;
        }

        function groupByDate(items) {
            const map = {};
            items.forEach(item => {
                if (!map[item.date]) map[item.date] = [];
                map[item.date].push(item);
            });
            return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
        }

        function groupByCategory(items) {
            const map = {};
            items.forEach(item => {
                if (!map[item.category]) map[item.category] = [];
                map[item.category].push(item);
            });
            return map;
        }

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1));
            const [events, setEvents] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [loadError, setLoadError] = useState("");
            const [dataSource, setDataSource] = useState("");
            const [viewMode, setViewMode] = useState("month");
            const [activeCategory, setActiveCategory] = useState("All");
            const [searchText, setSearchText] = useState("");

            useEffect(() => {
                const eventsUrl = new URL("./events.json", window.location.href).toString();

                fetch(eventsUrl, { cache: "no-store" })
                    .then(async (res) => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const text = await res.text();

                        let data;
                        try {
                            data = JSON.parse(text);
                        } catch (e) {
                            throw new Error("JSON 解析失败: " + e.message);
                        }

                        if (!Array.isArray(data)) {
                            throw new Error("events.json 不是数组格式");
                        }

                        setEvents(data);
                        setDataSource(`已加载 events.json，共 ${data.length} 条活动`);
                        setLoadError("");
                        setIsLoading(false);
                    })
                    .catch((err) => {
                        console.error("加载 events.json 失败:", err);
                        setLoadError(String(err));
                        setEvents(MOCK_EVENTS);
                        setDataSource("加载失败，当前显示的是演示数据");
                        setIsLoading(false);
                    });
            }, []);

            useEffect(() => {
                lucide.createIcons();
            });

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const nextMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            };

            const prevMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            };

            const daysInMonth = getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth());
            const firstDay = getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth());

            const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
            const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

            const currentMonthPrefix = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}`;

            const filteredEvents = useMemo(() => {
                return events.filter((e) => {
                    const inMonth = e.date?.startsWith(currentMonthPrefix);
                    const inCategory = activeCategory === "All" ? true : e.category === activeCategory;
                    const inSearch = searchText.trim()
                        ? (e.title || "").toLowerCase().includes(searchText.trim().toLowerCase())
                        : true;
                    return inMonth && inCategory && inSearch;
                });
            }, [events, currentMonthPrefix, activeCategory, searchText]);

            const allMonthEvents = useMemo(() => {
                return events.filter(e => e.date?.startsWith(currentMonthPrefix));
            }, [events, currentMonthPrefix]);

            const monthCategoryStats = useMemo(() => {
                const stats = {
                    All: allMonthEvents.length,
                    TV: 0,
                    Radio: 0,
                    Web: 0,
                    Event: 0,
                    Live: 0,
                    Release: 0,
                    Other: 0
                };
                allMonthEvents.forEach(e => {
                    if (stats[e.category] !== undefined) stats[e.category] += 1;
                    else stats.Other += 1;
                });
                return stats;
            }, [allMonthEvents]);

            const getEventsForDate = (dateString) => {
                return filteredEvents.filter(e => e.date === dateString);
            };

            const handleDayClick = (day) => {
                const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                setSelectedDate({
                    day,
                    dateString,
                    events: getEventsForDate(dateString)
                });
            };

            const groupedListEvents = useMemo(() => groupByDate(filteredEvents), [filteredEvents]);
            const groupedCategoryEvents = useMemo(() => groupByCategory(filteredEvents), [filteredEvents]);

            const renderMonthView = () => (
                <div className="bg-white border-x border-b border-gray-100 rounded-b-2xl shadow-sm overflow-hidden">
                    <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
                        {dayNames.map((day, i) => (
                            <div
                                key={day}
                                className={`py-3 text-center text-sm font-medium ${i === 0 || i === 6 ? "text-nana-accent" : "text-gray-500"}`}
                            >
                                {day}
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-7 auto-rows-fr">
                        {[...Array(firstDay)].map((_, i) => (
                            <div key={`empty-${i}`} className="min-h-[100px] p-2 border-b border-r border-gray-50 bg-gray-50/50"></div>
                        ))}

                        {[...Array(daysInMonth)].map((_, i) => {
                            const day = i + 1;
                            const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                            const dayEvents = getEventsForDate(dateString);
                            const isToday =
                                new Date().toDateString() ===
                                new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toDateString();

                            return (
                                <div
                                    key={day}
                                    onClick={() => handleDayClick(day)}
                                    className="min-h-[100px] md:min-h-[120px] p-1 md:p-2 border-b border-r border-gray-100 hover:bg-nana-light/30 transition cursor-pointer relative group"
                                >
                                    <div className="flex justify-between items-start mb-1">
                                        <span
                                            className={`text-sm md:text-base w-7 h-7 flex items-center justify-center rounded-full ${
                                                isToday
                                                    ? "bg-nana-accent text-white font-bold"
                                                    : "text-gray-700 font-medium group-hover:text-nana-blue"
                                            }`}
                                        >
                                            {day}
                                        </span>
                                        {dayEvents.length > 0 && (
                                            <span className="text-xs bg-gray-100 text-gray-500 px-1.5 rounded-full hidden md:block">
                                                {dayEvents.length}
                                            </span>
                                        )}
                                    </div>

                                    <div className="space-y-1 mt-1">
                                        {dayEvents.slice(0, 3).map((e) => (
                                            <div
                                                key={e.id}
                                                className={`text-xs px-1.5 py-1 rounded truncate border ${
                                                    CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other
                                                }`}
                                            >
                                                {e.time && <span className="font-semibold mr-1">{e.time}</span>}
                                                {e.title}
                                            </div>
                                        ))}
                                        {dayEvents.length > 3 && (
                                            <div className="text-xs text-center text-gray-400 font-medium">
                                                + {dayEvents.length - 3} 个活动
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderListView = () => (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6">
                    {groupedListEvents.length === 0 ? (
                        <div className="text-center py-10 text-gray-400">当前条件下没有活动</div>
                    ) : (
                        <div className="space-y-6">
                            {groupedListEvents.map(([date, items]) => (
                                <div key={date}>
                                    <div className="sticky top-20 z-[1] bg-white pb-2">
                                        <h3 className="text-lg font-bold text-gray-800 border-l-4 border-nana-accent pl-3">
                                            {formatDateCN(date)}
                                        </h3>
                                    </div>
                                    <div className="space-y-3 mt-3">
                                        {items.map((e) => (
                                            <div
                                                key={e.id}
                                                className={`p-4 rounded-xl border ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other}`}
                                            >
                                                <div className="flex items-start justify-between gap-3">
                                                    <div className="flex-1">
                                                        <div className="font-bold text-sm md:text-base">{e.title}</div>
                                                        <div className="mt-2 text-xs opacity-80 flex items-center gap-3 flex-wrap">
                                                            <span className="uppercase font-semibold tracking-wider">{e.category}</span>
                                                            {e.time && <span>{e.time}</span>}
                                                        </div>
                                                    </div>
                                                    {e.url && (
                                                        <a
                                                            href={e.url}
                                                            target="_blank"
                                                            rel="noopener noreferrer"
                                                            className="text-xs text-nana-accent hover:text-blue-800 whitespace-nowrap"
                                                        >
                                                            查看详情
                                                        </a>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderCategoryView = () => {
                const order = ["Event", "TV", "Radio", "Web", "Live", "Release", "Other"];
                const categoriesToShow = activeCategory === "All" ? order : [activeCategory];

                return (
                    <div className="space-y-4">
                        {categoriesToShow.map((cat) => {
                            const items = groupedCategoryEvents[cat] || [];
                            return (
                                <div key={cat} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-lg font-bold text-gray-800">{CATEGORY_LABELS[cat]}</h3>
                                        <span className={`text-xs px-2 py-1 rounded-full border ${CATEGORY_COLORS[cat] || CATEGORY_COLORS.Other}`}>
                                            {items.length} 条
                                        </span>
                                    </div>

                                    {items.length === 0 ? (
                                        <div className="text-sm text-gray-400">这一类当前月份没有活动</div>
                                    ) : (
                                        <div className="space-y-3">
                                            {items
                                                .sort((a, b) => a.date.localeCompare(b.date) || a.title.localeCompare(b.title))
                                                .map((e) => (
                                                    <div
                                                        key={e.id}
                                                        className={`p-4 rounded-xl border ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other}`}
                                                    >
                                                        <div className="flex items-start justify-between gap-3">
                                                            <div className="flex-1">
                                                                <div className="text-xs opacity-70 mb-1">{formatDateCN(e.date)}</div>
                                                                <div className="font-bold text-sm md:text-base">{e.title}</div>
                                                            </div>
                                                            {e.url && (
                                                                <a
                                                                    href={e.url}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="text-xs text-nana-accent hover:text-blue-800 whitespace-nowrap"
                                                                >
                                                                    查看详情
                                                                </a>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-nana-blue text-white shadow-md py-4 px-6 sticky top-0 z-20">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                                <i data-lucide="calendar-heart" className="w-6 h-6"></i>
                                22/7 (ナナブンノニジュウニ) 活动日历
                            </h1>
                            <a
                                href="https://nanabunnonijyuuni-mobile.com/"
                                target="_blank"
                                rel="noopener noreferrer"
                                className="text-sm text-nana-light hover:text-white transition hidden md:block"
                            >
                                访问官方移动端
                            </a>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto mt-8 px-4">
                        <div className="mb-4 rounded-xl border bg-white p-3 text-sm text-gray-600 shadow-sm">
                            {isLoading ? "正在加载活动数据..." : dataSource}
                            <div className="mt-1 text-gray-500">
                                当前月份共有 {allMonthEvents.length} 条活动，当前筛选后显示 {filteredEvents.length} 条
                            </div>
                            {loadError && (
                                <div className="mt-2 text-red-500 break-all">
                                    错误信息：{loadError}
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-[1fr_280px] gap-6">
                            <div>
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6 flex justify-between items-center">
                                    <button onClick={prevMonth} className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600">
                                        <i data-lucide="chevron-left" className="w-6 h-6"></i>
                                    </button>
                                    <h2 className="text-2xl font-bold text-gray-800">
                                        {currentDate.getFullYear()} 年 {monthNames[currentDate.getMonth()]}
                                    </h2>
                                    <button onClick={nextMonth} className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600">
                                        <i data-lucide="chevron-right" className="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mt-4 space-y-4">
                                    <div className="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                                        <div className="flex flex-wrap gap-2">
                                            {["month", "list", "category"].map((mode) => (
                                                <button
                                                    key={mode}
                                                    onClick={() => setViewMode(mode)}
                                                    className={`px-3 py-2 rounded-lg text-sm font-medium border transition ${
                                                        viewMode === mode
                                                            ? "bg-nana-blue text-white border-nana-blue"
                                                            : "bg-white text-gray-600 border-gray-200 hover:bg-gray-50"
                                                    }`}
                                                >
                                                    {VIEW_LABELS[mode]}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="relative">
                                            <input
                                                type="text"
                                                value={searchText}
                                                onChange={(e) => setSearchText(e.target.value)}
                                                placeholder="搜索活动标题"
                                                className="w-full md:w-64 rounded-lg border border-gray-200 px-3 py-2 text-sm outline-none focus:border-nana-accent"
                                            />
                                        </div>
                                    </div>

                                    <div className="flex flex-wrap gap-2">
                                        {Object.keys(CATEGORY_LABELS).map((cat) => (
                                            <button
                                                key={cat}
                                                onClick={() => setActiveCategory(cat)}
                                                className={`px-3 py-1.5 rounded-full text-xs font-medium border transition ${
                                                    activeCategory === cat
                                                        ? "bg-nana-accent text-white border-nana-accent"
                                                        : "bg-white text-gray-600 border-gray-200 hover:bg-gray-50"
                                                }`}
                                            >
                                                {CATEGORY_LABELS[cat]} ({monthCategoryStats[cat] ?? 0})
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="mt-4">
                                    {viewMode === "month" && renderMonthView()}
                                    {viewMode === "list" && renderListView()}
                                    {viewMode === "category" && renderCategoryView()}
                                </div>
                            </div>

                            <aside className="space-y-4">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-3">本月统计</h3>
                                    <div className="space-y-2">
                                        {Object.entries(monthCategoryStats).map(([cat, count]) => (
                                            <div key={cat} className="flex items-center justify-between text-sm">
                                                <span className={cat === "All" ? "text-gray-800 font-semibold" : "text-gray-600"}>
                                                    {CATEGORY_LABELS[cat]}
                                                </span>
                                                <span className="font-bold text-gray-800">{count}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-3">快捷筛选</h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        {["Event", "TV", "Radio", "Web", "Live", "Release"].map((cat) => (
                                            <button
                                                key={cat}
                                                onClick={() => {
                                                    setActiveCategory(cat);
                                                    setViewMode("category");
                                                }}
                                                className={`text-xs px-3 py-2 rounded-lg border ${CATEGORY_COLORS[cat] || CATEGORY_COLORS.Other}`}
                                            >
                                                {CATEGORY_LABELS[cat]}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                                    <h3 className="text-lg font-bold text-gray-800 mb-3">使用说明</h3>
                                    <div className="text-sm text-gray-600 space-y-2">
                                        <p>月历：适合按日期查看。</p>
                                        <p>列表：适合连续浏览本月全部活动。</p>
                                        <p>分类：适合单独查看 Event / TV / Radio 等。</p>
                                    </div>
                                </div>
                            </aside>
                        </div>
                    </main>

                    {selectedDate && (
                        <div
                            className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
                            onClick={() => setSelectedDate(null)}
                        >
                            <div
                                className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="bg-nana-blue p-4 flex justify-between items-center text-white">
                                    <h3 className="text-lg font-bold flex items-center gap-2">
                                        <i data-lucide="calendar" className="w-5 h-5"></i>
                                        {selectedDate.dateString} 活动日程
                                    </h3>
                                    <button onClick={() => setSelectedDate(null)} className="hover:bg-white/20 p-1 rounded transition">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="p-4 max-h-[60vh] overflow-y-auto">
                                    {selectedDate.events.length === 0 ? (
                                        <div className="text-center py-8 text-gray-400">
                                            <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                                            <p>这一天暂时没有记录活动哦</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {selectedDate.events.map((e) => (
                                                <div
                                                    key={e.id}
                                                    className={`p-3 rounded-xl border flex gap-3 ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other}`}
                                                >
                                                    <div className="mt-0.5">
                                                        {e.category === "TV" ? (
                                                            <i data-lucide="tv" className="w-5 h-5"></i>
                                                        ) : e.category === "Radio" ? (
                                                            <i data-lucide="radio" className="w-5 h-5"></i>
                                                        ) : (
                                                            <i data-lucide="star" className="w-5 h-5"></i>
                                                        )}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="font-bold text-sm mb-0.5">{e.title}</div>
                                                        <div className="text-xs opacity-80 flex items-center gap-3 mb-1">
                                                            {e.time && <span>{e.time}</span>}
                                                            <span className="uppercase font-semibold tracking-wider">{e.category}</span>
                                                        </div>
                                                        {e.url && (
                                                            <a
                                                                href={e.url}
                                                                target="_blank"
                                                                rel="noopener noreferrer"
                                                                className="inline-flex items-center text-xs text-nana-accent hover:text-blue-800 transition mt-1"
                                                            >
                                                                查看详情 <i data-lucide="external-link" className="w-3 h-3 ml-1"></i>
                                                            </a>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                                    <button
                                        onClick={() => setSelectedDate(null)}
                                        className="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-sm font-medium transition"
                                    >
                                        关闭
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
