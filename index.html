<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22/7 (ナナブンノニジュウニ) 活动日历</title>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nana: {
                            blue: '#1a3668',    // 22/7 标志性的深蓝色
                            light: '#e6f0fa',
                            accent: '#4a90e2'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 默认模拟数据 (当 GitHub 还没有生成 events.json 时显示)
        const MOCK_EVENTS = [
            { id: 1, date: '2026-03-14', title: '22/7 音乐节目出演', category: 'TV', time: '23:00', url: 'https://nanabunnonijyuuni-mobile.com/' },
            { id: 2, date: '2026-03-22', title: '22/7 计算中 (Season 5)', category: 'TV', time: '23:00', url: 'https://nanabunnonijyuuni-mobile.com/' },
            { id: 3, date: '2026-03-22', title: '成员个人 SHOWROOM 配信', category: 'Web', time: '20:00', url: 'https://nanabunnonijyuuni-mobile.com/' },
            { id: 4, date: '2026-03-27', title: '22/7 割り切れないラジオ', category: 'Radio', time: '16:00', url: 'https://nanabunnonijyuuni-mobile.com/' },
            { id: 5, date: '2026-03-05', title: '新单曲发售纪念 Talk 会', category: 'Event', time: '12:00', url: 'https://nanabunnonijyuuni-mobile.com/' }
        ];

        const CATEGORY_COLORS = {
            'TV': 'bg-blue-100 text-blue-800 border-blue-200',
            'Radio': 'bg-orange-100 text-orange-800 border-orange-200',
            'Web': 'bg-purple-100 text-purple-800 border-purple-200',
            'Event': 'bg-pink-100 text-pink-800 border-pink-200',
            'Live': 'bg-red-100 text-red-800 border-red-200',
            'Release': 'bg-green-100 text-green-800 border-green-200',
            'Other': 'bg-gray-100 text-gray-800 border-gray-200'
        };

        const App = () => {
            // 默认显示 2026 年 3 月（根据你的链接需求）
            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); 
            const [events, setEvents] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                // 尝试从 events.json 加载数据
                fetch('events.json')
                    .then(res => {
                        if (!res.ok) throw new Error('Network response was not ok');
                        return res.json();
                    })
                    .then(data => {
                        setEvents(data);
                        setIsLoading(false);
                    })
                    .catch(err => {
                        console.log('未找到 events.json，使用演示数据。');
                        setEvents(MOCK_EVENTS);
                        setIsLoading(false);
                    });
            }, []);

            useEffect(() => {
                // 每次渲染后重新初始化图标，确保动态生成的 DOM 也能带上图标
                lucide.createIcons();
            });

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const daysInMonth = getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth());
            const firstDay = getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth());

            const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
            const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

            const getEventsForDate = (dateString) => {
                return events.filter(e => e.date === dateString);
            };

            const handleDayClick = (day) => {
                const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                setSelectedDate({ day, dateString, events: getEventsForDate(dateString) });
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <header className="bg-nana-blue text-white shadow-md py-4 px-6 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                                <i data-lucide="calendar-heart" className="w-6 h-6"></i>
                                22/7 (ナナブンノニジュウニ) 活动日历
                            </h1>
                            <a href="https://nanabunnonijyuuni-mobile.com/" target="_blank" className="text-sm text-nana-light hover:text-white transition hidden md:block">
                                访问官方移动端
                            </a>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-8 px-4">
                        {/* Calendar Controls */}
                        <div className="bg-white rounded-t-2xl shadow-sm border border-gray-100 p-4 md:p-6 flex justify-between items-center">
                            <button onClick={prevMonth} className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600">
                                <i data-lucide="chevron-left" className="w-6 h-6"></i>
                            </button>
                            <h2 className="text-2xl font-bold text-gray-800">
                                {currentDate.getFullYear()} 年 {monthNames[currentDate.getMonth()]}
                            </h2>
                            <button onClick={nextMonth} className="p-2 rounded-full hover:bg-gray-100 transition text-gray-600">
                                <i data-lucide="chevron-right" className="w-6 h-6"></i>
                            </button>
                        </div>

                        {/* Calendar Grid */}
                        <div className="bg-white border-x border-b border-gray-100 rounded-b-2xl shadow-sm overflow-hidden">
                            {/* Days Header */}
                            <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
                                {dayNames.map((day, i) => (
                                    <div key={day} className={`py-3 text-center text-sm font-medium ${i === 0 || i === 6 ? 'text-nana-accent' : 'text-gray-500'}`}>
                                        {day}
                                    </div>
                                ))}
                            </div>

                            {/* Calendar Days */}
                            <div className="grid grid-cols-7 auto-rows-fr">
                                {/* Empty cells before month starts */}
                                {[...Array(firstDay)].map((_, i) => (
                                    <div key={`empty-${i}`} className="min-h-[100px] p-2 border-b border-r border-gray-50 bg-gray-50/50"></div>
                                ))}
                                
                                {/* Actual days */}
                                {[...Array(daysInMonth)].map((_, i) => {
                                    const day = i + 1;
                                    const dateString = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                    const dayEvents = getEventsForDate(dateString);
                                    const isToday = new Date().toDateString() === new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toDateString();

                                    return (
                                        <div 
                                            key={day} 
                                            onClick={() => handleDayClick(day)}
                                            className="min-h-[100px] md:min-h-[120px] p-1 md:p-2 border-b border-r border-gray-100 hover:bg-nana-light/30 transition cursor-pointer relative group"
                                        >
                                            <div className="flex justify-between items-start mb-1">
                                                <span className={`text-sm md:text-base w-7 h-7 flex items-center justify-center rounded-full ${isToday ? 'bg-nana-accent text-white font-bold' : 'text-gray-700 font-medium group-hover:text-nana-blue'}`}>
                                                    {day}
                                                </span>
                                                {dayEvents.length > 0 && (
                                                    <span className="text-xs bg-gray-100 text-gray-500 px-1.5 rounded-full hidden md:block">
                                                        {dayEvents.length}
                                                    </span>
                                                )}
                                            </div>
                                            
                                            <div className="space-y-1 mt-1">
                                                {dayEvents.slice(0, 3).map((e, idx) => (
                                                    <div key={idx} className={`text-xs px-1.5 py-1 rounded truncate border ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS['Other']}`}>
                                                        {e.time && <span className="font-semibold mr-1">{e.time}</span>}
                                                        {e.title}
                                                    </div>
                                                ))}
                                                {dayEvents.length > 3 && (
                                                    <div className="text-xs text-center text-gray-400 font-medium">
                                                        + {dayEvents.length - 3} 个活动
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                    {/* Event Detail Modal */}
                    {selectedDate && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setSelectedDate(null)}>
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="bg-nana-blue p-4 flex justify-between items-center text-white">
                                    <h3 className="text-lg font-bold flex items-center gap-2">
                                        <i data-lucide="calendar" className="w-5 h-5"></i>
                                        {selectedDate.dateString} 活动日程
                                    </h3>
                                    <button onClick={() => setSelectedDate(null)} className="hover:bg-white/20 p-1 rounded transition">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                
                                <div className="p-4 max-h-[60vh] overflow-y-auto">
                                    {selectedDate.events.length === 0 ? (
                                        <div className="text-center py-8 text-gray-400">
                                            <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                                            <p>这一天暂时没有记录活动哦</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {selectedDate.events.map((e, idx) => (
                                                <div key={idx} className={`p-3 rounded-xl border flex gap-3 ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS['Other']}`}>
                                                    <div className="mt-0.5">
                                                        {e.category === 'TV' ? <i data-lucide="tv" className="w-5 h-5"></i> :
                                                         e.category === 'Radio' ? <i data-lucide="radio" className="w-5 h-5"></i> :
                                                         <i data-lucide="star" className="w-5 h-5"></i>}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="font-bold text-sm mb-0.5">{e.title}</div>
                                                        <div className="text-xs opacity-80 flex items-center gap-3 mb-1">
                                                            {e.time && <span><i data-lucide="clock" className="w-3 h-3 inline mr-1"></i>{e.time}</span>}
                                                            <span className="uppercase font-semibold tracking-wider">{e.category}</span>
                                                        </div>
                                                        {e.url && (
                                                            <a href={e.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center text-xs text-nana-accent hover:text-blue-800 transition mt-1">
                                                                查看详情 <i data-lucide="external-link" className="w-3 h-3 ml-1"></i>
                                                            </a>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                                    <button onClick={() => setSelectedDate(null)} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-sm font-medium transition">
                                        关闭
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化图标
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
